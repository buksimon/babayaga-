<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/jpeg" href="logo.jpg">
<link rel="apple-touch-icon" href="logo.jpg">
<link rel="shortcut icon" href="logo.jpg">
<link rel="manifest" href="manifest.json">
<title>BABAYAGA - Bookmaker Upload</title>
<style>
  :root{
    --green:#00ff66;
    --green-dim:#00cc55;
    --black:#000000;
    --panel:#0a0f0c;
    --border:#163322;
    --grey:#7d9488;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--black);font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#fff;min-height:100vh;min-height:100dvh;}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--panel);position:sticky;top:0;z-index:5;}
  .topbar .icon-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:#0d1410;display:flex;align-items:center;justify-content:center;color:var(--green);font-size:18px;text-decoration:none;}
  .topbar .brand b{color:var(--green);font-size:17px;letter-spacing:1.5px;}
  .topbar .brand span{display:block;color:var(--grey);font-size:9px;letter-spacing:2px;margin-top:1px;}
  .counter-pill{background:#0d1310;border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--green);font-weight:700;}

  .content{padding:14px 14px 110px;}
  .hint{color:var(--grey);font-size:11px;line-height:1.6;margin-bottom:14px;padding:10px 12px;background:var(--panel);border:1px solid var(--border);border-radius:8px;}

  .slot{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;transition:border-color .2s;}
  .slot.filled{border-color:var(--green-dim);}
  .slot-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .slot-num{width:30px;height:30px;flex-shrink:0;border-radius:8px;background:#0d1a12;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--grey);}
  .slot.filled .slot-num{color:var(--green);border-color:var(--green-dim);}
  .slot-teams{font-size:12px;color:#ccc;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .slot-status{width:8px;height:8px;border-radius:50%;background:#222;flex-shrink:0;}
  .slot.filled .slot-status{background:var(--green);box-shadow:0 0 6px rgba(0,255,102,.7);}

  .upload-zone{border:1.5px dashed var(--border);border-radius:8px;padding:16px;text-align:center;cursor:pointer;}
  .upload-zone.filled{border-style:solid;border-color:var(--green-dim);background:#0a140e;}
  .upload-zone input[type=file]{display:none;}
  .upload-icon{font-size:20px;color:var(--grey);margin-bottom:4px;}
  .upload-zone.filled .upload-icon{color:var(--green);}
  .upload-text{color:var(--grey);font-size:11px;}
  .upload-zone.filled .upload-text{color:#fff;font-weight:600;}
  .upload-sub{color:#3d4d44;font-size:9px;margin-top:2px;}

  .cta-bar{position:fixed;bottom:0;left:0;right:0;padding:14px 16px;background:linear-gradient(0deg,var(--black) 65%,transparent);}
  .btn-primary{width:100%;padding:15px;border:none;border-radius:10px;background:var(--green);color:#000;font-weight:800;font-size:15px;letter-spacing:.5px;}
  .btn-primary:disabled{background:#1a2a20;color:#4a5a50;}

  .empty-state{text-align:center;color:var(--grey);font-size:13px;margin-top:60px;line-height:1.7;padding:0 20px;}

  ::-webkit-scrollbar{width:0;}
</style>
</head>
<body>

<div class="topbar">
  <a href="page1.html" class="icon-btn">&#8962;</a>
  <div class="brand" style="text-align:center;"><b>BABAYAGA</b><span>BOOKMAKER UPLOAD</span></div>
  <div class="counter-pill" id="counterPill">0 / 0</div>
</div>

<div class="content">
  <div class="hint">Upload the bookmaker odds screenshot or PDF for each match you entered on the previous page. This step only collects data — analysis runs on the next screen.</div>
  <div id="slots"></div>
</div>

<div class="cta-bar">
  <button class="btn-primary" id="proceedBtn" disabled onclick="proceed()">PROCEED</button>
</div>

<script>
let matches = [];
let uploadedCount = 0;

function loadMatches(){
  const raw = sessionStorage.getItem('babayaga_page1_data');
  matches = raw ? JSON.parse(raw) : [];

  const wrap = document.getElementById('slots');
  if(matches.length === 0){
    wrap.innerHTML = `<div class="empty-state">No matches found from Page 1.<br>Go back and paste at least one Sofascore link first.</div>`;
    return;
  }

  let html = '';
  matches.forEach((m, idx) => {
    html += `
    <div class="slot" id="slot-${idx}">
      <div class="slot-head">
        <div class="slot-num">${m.slot}</div>
        <div class="slot-teams" id="teams-${idx}">${m.home} vs ${m.away}</div>
        <div class="slot-status" id="dot-${idx}"></div>
      </div>
      <label class="upload-zone" id="zone-${idx}">
        <input type="file" accept="application/pdf,image/*" id="file-${idx}" onchange="onFileChange(${idx})">
        <div class="upload-icon">&#8613;</div>
        <div class="upload-text" id="uptext-${idx}">Tap to upload PDF or screenshot</div>
        <div class="upload-sub">PDF, JPG, or PNG</div>
      </label>
    </div>`;
  });
  wrap.innerHTML = html;
  document.getElementById('counterPill').textContent = `0 / ${matches.length}`;
}

function onFileChange(idx){
  const fileInput = document.getElementById(`file-${idx}`);
  const file = fileInput.files[0];
  const zone = document.getElementById(`zone-${idx}`);
  const slot = document.getElementById(`slot-${idx}`);
  const uptext = document.getElementById(`uptext-${idx}`);

  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(e){
    zone.classList.add('filled');
    slot.classList.add('filled');
    uptext.textContent = file.name;
    matches[idx].fileName = file.name;
    matches[idx].fileType = file.type;
    matches[idx].fileData = e.target.result; // base64 data URL
    matches[idx].uploaded = true;
    updateCounter();
  };
  reader.readAsDataURL(file);
}

function updateCounter(){
  uploadedCount = matches.filter(m => m.uploaded).length;
  document.getElementById('counterPill').textContent = `${uploadedCount} / ${matches.length}`;
  document.getElementById('proceedBtn').disabled = uploadedCount < matches.length || matches.length === 0;
}

function proceed(){
  sessionStorage.setItem('babayaga_page1_data', JSON.stringify(matches));
  window.location.href = 'page3.html';
}

loadMatches();
</script>
</body>
</html>
