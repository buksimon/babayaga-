<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BABAYAGA</title>
<link rel="icon" type="image/jpeg" href="logo.jpg">
<link rel="apple-touch-icon" href="logo.jpg">
<link rel="shortcut icon" href="logo.jpg">
<link rel="manifest" href="manifest.json">
<style>
  :root{
    --green:#00ff66;
    --green-dim:#00cc55;
    --black:#000000;
    --panel:#0a0f0c;
    --border:#163322;
    --grey:#7d9488;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--black);font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#fff;}
  body{min-height:100vh;min-height:100dvh;}

  /* ---------- LOADING ---------- */
  #loading{position:fixed;inset:0;background:var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:50;}
  .logo-ring{width:120px;height:120px;border:3px solid var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(0,255,102,.5);animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 18px rgba(0,255,102,.4);}50%{box-shadow:0 0 36px rgba(0,255,102,.8);}}
  .logo-letter{font-size:56px;font-weight:900;color:var(--green);font-family:Georgia,serif;font-style:italic;}
  .brand-name{font-size:30px;font-weight:900;letter-spacing:4px;color:var(--green);text-shadow:0 0 14px rgba(0,255,102,.7);}
  .loading-sub{color:var(--grey);font-size:12px;}
  .progress-bar{width:200px;height:5px;background:#0d1310;border-radius:4px;overflow:hidden;border:1px solid var(--border);}
  .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--green-dim),var(--green));transition:width .3s;}
  #loading.hidden{display:none;}

  /* ---------- TOP BAR ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--panel);position:sticky;top:0;z-index:5;}
  .topbar .brand b{color:var(--green);font-size:17px;letter-spacing:1.5px;}
  .topbar .brand span{display:block;color:var(--grey);font-size:9px;letter-spacing:2px;margin-top:1px;}
  .counter-pill{background:#0d1310;border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--green);font-weight:700;}

  /* ---------- CONTENT ---------- */
  .content{padding:14px 14px 110px;}
  .hint{color:var(--grey);font-size:11px;line-height:1.6;margin-bottom:14px;padding:10px 12px;background:var(--panel);border:1px solid var(--border);border-radius:8px;}

  .slot{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;transition:border-color .2s;}
  .slot.filled{border-color:var(--green-dim);}
  .slot-num{width:34px;height:34px;flex-shrink:0;border-radius:8px;background:#0d1a12;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--grey);}
  .slot.filled .slot-num{color:var(--green);border-color:var(--green-dim);}
  .slot-input{flex:1;min-width:0;}
  .slot-input input{width:100%;background:#050805;border:1px solid var(--border);border-radius:6px;padding:9px 10px;color:#fff;font-size:12px;}
  .slot-input input::placeholder{color:#3d4d44;}
  .slot-input input:focus{outline:none;border-color:var(--green);}
  .slot-status{width:8px;height:8px;border-radius:50%;background:#222;flex-shrink:0;}
  .slot.filled .slot-status{background:var(--green);box-shadow:0 0 6px rgba(0,255,102,.7);}
  .slot.loading .slot-status{background:#ffc107;animation:blinkdot .8s infinite;}
  .slot.error .slot-status{background:#ff6b6b;}
  @keyframes blinkdot{0%,100%{opacity:1;}50%{opacity:.3;}}
  .slot-teams{grid-column:1/-1;font-size:11px;color:var(--green);margin-top:6px;padding-left:44px;}
  .slot-teams.error-text{color:#ff6b6b;}

  .cta-bar{position:fixed;bottom:0;left:0;right:0;padding:14px 16px;background:linear-gradient(0deg,var(--black) 65%,transparent);}
  .btn-primary{width:100%;padding:15px;border:none;border-radius:10px;background:var(--green);color:#000;font-weight:800;font-size:15px;letter-spacing:.5px;}
  .btn-primary:disabled{background:#1a2a20;color:#4a5a50;}

  /* ---------- DOWNLOAD POPUP ---------- */
  #downloadOverlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:60;}
  #downloadOverlay.hidden{display:none;}
  .sheet{width:100%;max-width:480px;background:var(--panel);border:1px solid var(--green);border-radius:18px 18px 0 0;padding:20px;animation:slideup .25s ease-out;}
  @keyframes slideup{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .sheet-head h3{margin:0;font-size:14px;letter-spacing:1px;color:#fff;}
  .sheet-close{color:var(--grey);font-size:20px;background:none;border:none;}
  .sheet-row{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .sheet-icon{width:46px;height:46px;border-radius:10px;background:#0d1a12;border:1px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--green);font-weight:900;font-style:italic;}
  .sheet-info b{display:block;font-size:14px;color:#fff;}
  .sheet-info span{color:var(--grey);font-size:11px;}
  .btn-secondary{width:100%;padding:13px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--grey);font-weight:600;font-size:13px;margin-top:8px;}

  ::-webkit-scrollbar{width:0;}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="logo-ring"><div class="logo-letter">B</div></div>
  <div class="brand-name">BABAYAGA</div>
  <div class="loading-sub" id="loadingMsg">Initializing BABAYAGA...</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<!-- PAGE 1 -->
<div class="topbar">
  <div class="brand"><b>BABAYAGA</b><span>VOF SYSTEMS — MATCH INPUT</span></div>
  <div class="counter-pill" id="counterPill">0 / 35</div>
</div>

<div class="content">
  <div class="hint">Paste a Sofascore match link into any slot below. Not all 35 need to be filled — analysis runs on whatever you've entered.</div>
  <div id="slots"></div>
</div>

<div class="cta-bar">
  <button class="btn-primary" id="analyzeBtn" disabled onclick="runAnalyze()">ANALYZE</button>
</div>

<!-- DOWNLOAD POPUP -->
<div id="downloadOverlay" class="hidden">
  <div class="sheet">
    <div class="sheet-head">
      <h3>DOWNLOAD APP</h3>
      <button class="sheet-close" onclick="closeDownload()">&times;</button>
    </div>
    <div class="sheet-row">
      <div class="sheet-icon">B</div>
      <div class="sheet-info">
        <b>BABAYAGA — VOF Systems</b>
        <span>Add to Home Screen for app-like access</span>
      </div>
    </div>
    <button class="btn-primary" onclick="installApp()">ADD TO HOME SCREEN</button>
    <button class="btn-secondary" onclick="closeDownload()">NOT NOW</button>
  </div>
</div>

<script>
const TOTAL_SLOTS = 35;
let filledCount = 0;

function buildSlots(){
  const wrap = document.getElementById('slots');
  let html = '';
  for(let i = 1; i <= TOTAL_SLOTS; i++){
    html += `
    <div class="slot" id="slot-${i}" style="display:flex;flex-wrap:wrap;align-items:center;">
      <div class="slot-num">${i}</div>
      <div class="slot-input">
        <input type="text" id="link-${i}" placeholder="Paste Sofascore match link..." oninput="onSlotChange(${i})">
      </div>
      <div class="slot-status" id="dot-${i}"></div>
      <div class="slot-teams" id="teams-${i}"></div>
    </div>`;
  }
  wrap.innerHTML = html;
}

// Stores the full collected data per slot, keyed by slot number
let matchData = {};
let fetchTimers = {};

function extractEventId(url){
  const match = url.match(/#id:(\d+)/) || url.match(/id:(\d+)/) || url.match(/\/(\d{6,})/);
  return match ? match[1] : null;
}

function onSlotChange(i){
  const val = document.getElementById(`link-${i}`).value.trim();
  const eventId = extractEventId(val);

  clearTimeout(fetchTimers[i]);

  if(!eventId){
    setSlotState(i, 'empty');
    delete matchData[i];
    updateCounter();
    return;
  }

  setSlotState(i, 'loading');
  // Debounce so it doesn't fire on every keystroke while pasting
  fetchTimers[i] = setTimeout(() => fetchMatchData(i, val, eventId), 500);
}

async function fetchMatchData(i, url, eventId){
  try{
    const res = await fetch(`https://api.sofascore.com/api/v1/event/${eventId}`);
    if(!res.ok) throw new Error('status ' + res.status);
    const json = await res.json();
    const ev = json.event || {};

    const homeName = ev.homeTeam ? ev.homeTeam.name : null;
    const awayName = ev.awayTeam ? ev.awayTeam.name : null;
    if(!homeName || !awayName) throw new Error('no team data');

    const record = {
      slot: i,
      url: url,
      eventId: eventId,
      home: homeName,
      away: awayName,
      tournament: ev.tournament ? ev.tournament.name : null,
      category: ev.tournament && ev.tournament.category ? ev.tournament.category.name : null,
      round: ev.roundInfo ? ev.roundInfo.round : null,
      startTimestamp: ev.startTimestamp || null,
      venue: ev.venue ? ev.venue.name : null,
      homeRank: null,
      awayRank: null,
      h2hCount: null
    };

    matchData[i] = record;
    setSlotState(i, 'filled', record);

    // Try to enrich with standings + H2H in the background (best-effort, non-blocking)
    enrichStandings(i, eventId);
    enrichH2H(i, eventId);

  } catch(err){
    setSlotState(i, 'error');
    delete matchData[i];
  }
  updateCounter();
}

async function enrichStandings(i, eventId){
  try{
    const res = await fetch(`https://api.sofascore.com/api/v1/event/${eventId}/standings/total`);
    if(!res.ok) return;
    const json = await res.json();
    // Standings structure varies; best-effort extraction
    if(matchData[i]) {
      matchData[i].standingsRaw = json;
    }
  } catch(err){ /* silent - standings are a bonus, not required */ }
}

async function enrichH2H(i, eventId){
  try{
    const res = await fetch(`https://api.sofascore.com/api/v1/event/${eventId}/h2h`);
    if(!res.ok) return;
    const json = await res.json();
    if(matchData[i] && json.teamDuel){
      matchData[i].h2hCount =
        (json.teamDuel.homeWins || 0) + (json.teamDuel.awayWins || 0) + (json.teamDuel.draws || 0);
    }
  } catch(err){ /* silent - H2H is a bonus, not required */ }
}

function setSlotState(i, state, record){
  const slotEl = document.getElementById(`slot-${i}`);
  const teamsEl = document.getElementById(`teams-${i}`);
  slotEl.classList.remove('filled','loading','error');

  if(state === 'loading'){
    slotEl.classList.add('loading');
    teamsEl.textContent = 'Fetching match data...';
    teamsEl.classList.remove('error-text');
  } else if(state === 'filled'){
    slotEl.classList.add('filled');
    teamsEl.textContent = `${record.home} vs ${record.away} — ${record.tournament || ''}`;
    teamsEl.classList.remove('error-text');
  } else if(state === 'error'){
    slotEl.classList.add('error');
    teamsEl.textContent = 'Could not load match data — check the link';
    teamsEl.classList.add('error-text');
  } else {
    teamsEl.textContent = '';
  }
}

function updateCounter(){
  filledCount = Object.keys(matchData).length;
  document.getElementById('counterPill').textContent = `${filledCount} / ${TOTAL_SLOTS}`;
  document.getElementById('analyzeBtn').disabled = filledCount === 0;
}

function runAnalyze(){
  const records = Object.values(matchData);
  if(records.length === 0) return;
  sessionStorage.setItem('babayaga_page1_data', JSON.stringify(records));
  window.location.href = 'page2.html';
}

/* ---------------- LOADING SEQUENCE ---------------- */
function runLoadingSequence(){
  const fill = document.getElementById('progressFill');
  const msg = document.getElementById('loadingMsg');
  const steps = [[30,"Initializing BABAYAGA..."],[70,"Checking session..."],[100,"Ready."]];
  let i = 0;
  const iv = setInterval(()=>{
    if(i < steps.length){
      fill.style.width = steps[i][0] + "%";
      msg.textContent = steps[i][1];
      i++;
    } else {
      clearInterval(iv);
      setTimeout(()=>{
        document.getElementById('loading').classList.add('hidden');
        if(!sessionStorage.getItem('bbg_popup_shown')){
          setTimeout(()=>{ document.getElementById('downloadOverlay').classList.remove('hidden'); }, 500);
          sessionStorage.setItem('bbg_popup_shown','1');
        }
      }, 300);
    }
  }, 400);
}

function closeDownload(){ document.getElementById('downloadOverlay').classList.add('hidden'); }
function installApp(){
  closeDownload();
  alert("To finish: use your browser menu > 'Add to Home Screen'.");
}

buildSlots();
window.addEventListener('load', runLoadingSequence);
</script>
</body>
</html>
